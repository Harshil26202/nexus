line-length = 120
target-version = "py311"

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — formatter handles this
    "E402",   # module level import not at top (needed in some routers)
    "F841",   # local variable assigned but never used
]

[lint.per-file-ignores]
"tests/*" = ["F401", "F811"]  # tests import things for fixture side-effects
