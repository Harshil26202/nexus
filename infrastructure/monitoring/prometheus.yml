global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: nexus-local
    env: development

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: nexus-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: nexus-agent-worker
    static_configs:
      - targets: ["agent-worker:8001"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
